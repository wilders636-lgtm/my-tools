<!DOCTYPE HTML>
<html>

<head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div class="page-header">
    <h1><i class="fa-solid fa-dollar-sign"></i> Budget Tracker</h1>
    <p>Track your income and expenses to see how much money you have left each month.</p>

</div>

<style>
body{
    font-family: Arial;
}
</style>

</head>

<body class="budget-page">

<div class="top-header">

<!-- Home button top-left -->
<a href="index.html" class="home-btn">
    <span class="outlined-text">Free Tools</span>
</a>

<!-- Dropdown menu top-right -->
<div class="tool-menu">
    <button class="dropbtn">        
        <span class="outlined-text">Other Tools</span>
        <i class="fa-solid fa-caret-down"></i>
    </button>
    <div class="dropdown-content">
        <a href="budget-tracker.html">Budget Tracker</a>
        <a href="side-income.html">Side Job Income Tracker</a>
        <a href="nutrition-calculator.html">Nutrition & Macro Calculator</a>
        <a href="password-generator.html">Password Generator</a> 
        <a href="discount-calculator.html">Discount Calculator</a>   
    </div>
    </div>
</div>

<div class="budget-box">

<label>Monthly Income</label>
<input id="income" type="number">

<h2>Expenses</h2>

<label>Rent</label>
<input id="rent" type="number">

<label>Food</label>
<input id="food" type="number">

<label>Utilities</label>
<input id="utilities" type="number">

<label>Dining Out</label>
<input id="dining" type="number">

<label>Personal Use</label>
<input id="personal" type="number">

<label>Clothing</label>
<input id="clothing" type="number">

<label>Savings</label>
<input id="savings" type="number">

<br><br>

<button class="btn" onclick="calculateBudget()">Calculate</button>
<button class="btn" onclick="exportBudget()">Export to CSV</button>

</div>

<h2 id="expenses"></h2>
<h2 id="result"></h2>

<script src="budget.js"></script>

<script>
let lastScroll = 0;
const header = document.querySelector(".top-header");

window.addEventListener("scroll", () => {
    let currentScroll = window.pageYOffset;

    if (currentScroll > lastScroll) {
        // scrolling DOWN
        header.classList.add("hide");
    } else {
        // scrolling UP
        header.classList.remove("hide");
    }

    lastScroll = currentScroll;
});
</script>

</body>
</html>
