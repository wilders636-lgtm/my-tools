<!DOCTYPE html>
<html>
<head>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="style.css">

<div class="page-header">
    <h1><i class="fa-solid fa-wallet"></i> Side Job Income Tracker</h1>
    <p>Track how much you make from your second job or side hustle.</p>
</div>

</head>
<body class="side-income-page">

<div class="top-header"></div>

<!-- Home button top-left -->
<a href="index.html" class="home-btn">
    <i class="fa-solid fa-house"></i>
</a>

<!-- Dropdown menu top-right -->
<div class="tool-menu">
    <button class="dropbtn">        
        <span class="outlined-text">Other Tools</span>
        <i class="fa-solid fa-caret-down"></i></button>
    <div class="dropdown-content">
        <a href="budget-tracker.html">Budget Tracker</a>
        <a href="side-income.html">Side Job Income Tracker</a>
        <a href="nutrition-calculator.html">Nutrition & Macro Calculator</a>
        <a href="password-generator.html">Password Generator</a>    
    </div>
</div>


<div class="budget-box">

    <label for="hourlyPay">Hourly Pay ($)</label>
    <input type="number" id="hourlyPay" placeholder="e.g. 15">

    <label for="hoursWorked">Hours Worked</label>
    <input type="number" id="hoursWorked" placeholder="e.g. 20">

    <label for="state">State (optional)</label>
    <select id="state">
        <option value="">Select</option>
        <option value="CA">California - 10%</option>
        <option value="TX">Texas - 0%</option>
        <option value="NY">New York - 6%</option>
        <option value="PA">Pennsylvania - 3%</option>
        <option value="FL">Florida - 0%</option>
    </select>

    <label for="localTax">Local/District Tax % (optional)</label>
    <input type="number" id="localTax" placeholder="e.g. 2">

    <button onclick="calculateIncome()">Calculate Total Pay</button>
    
</div>

<h2 id="incomeResult"></h2>

<script src="side-income.js"></script>

<script>
let lastScroll = 0;
const header = document.querySelector(".top-header");

window.addEventListener("scroll", () => {
    let currentScroll = window.pageYOffset;

    if (currentScroll > lastScroll) {
        // scrolling DOWN
        header.classList.add("hide");
    } else {
        // scrolling UP
        header.classList.remove("hide");
    }

    lastScroll = currentScroll;
});
</script>
</body>
</html>
