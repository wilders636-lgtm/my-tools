<!DOCTYPE html>
<html>
<head>
    <title>Stock Market Viewer</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<!-- Top Header -->
<div class="top-header">
    <a href="index.html" class="home-btn">
        <span class="outlined-text">Free Tools</span>
    </a>

    <div class="tool-menu">
        <button class="dropbtn">
            <span class="outlined-text">Other Tools</span>
            <i class="fa-solid fa-caret-down"></i>
        </button>

        <div class="dropdown-content">
            <a href="budget-tracker.html">Budget Tracker</a>
            <a href="side-income.html">Side Job Income Tracker</a>
            <a href="nutrition-calculator.html">Nutrition & Macro Calculator</a>
            <a href="password-generator.html">Password Generator</a>
            <a href="discount-calculator.html">Discount Calculator</a>
        </div>
    </div>
</div>

<h1>Stock Market Viewer</h1>
<p>Real-time prices for the top 5 US stocks + search any ticker or company name.</p>

<div class="stocks-layout">
    <!-- LEFT COLUMN -->
    <div class="stocks-main">
        <!-- Search Box -->
        <div class="tool-box">
            <h3><i class="fa-solid fa-magnifying-glass"></i> Search Stock</h3>

            <input type="text" id="searchInput" placeholder="Enter ticker or company (e.g. NVDA or Nvidia)" oninput="handleAutocomplete()">
            <button onclick="searchStock()">Search</button>

            <!-- Autocomplete dropdown -->
            <div id="autocompleteList" class="autocomplete-list"></div>

            <div id="searchResult"></div>
        </div>

        <!-- Top 5 Stocks -->
        <div class="tool-box">
            <h3><i class="fa-solid fa-chart-line"></i> Top 5 US Stocks</h3>
            <div id="topStocks"></div>
        </div>
    </div>

    <!-- RIGHT COLUMN (Favorites + Recent) -->
    <div class="stocks-side-panel">
        <div class="tool-box">
            <h3><i class="fa-solid fa-star"></i> Favorites</h3>
            <div id="favoritesList"></div>
        </div>

        <div class="tool-box">
            <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Searches</h3>
            <div id="recentList"></div>
        </div>
    </div>
</div>

<script src="stocks.js"></script>

<script>
let lastScroll = 0;
const header = document.querySelector(".top-header");

window.addEventListener("scroll", () => {
    let currentScroll = window.pageYOffset;

    if (currentScroll > lastScroll) {
        header.classList.add("hide");
    } else {
        header.classList.remove("hide");
    }

    lastScroll = currentScroll;
});
</script>

</body>
</html>
