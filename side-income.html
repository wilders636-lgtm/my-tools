<h1><i class="fa-solid fa-wallet"></i> Side Job Income Tracker</h1>
<p>Track how much you make from your second job or side hustle.</p>

<div class="budget-box">

    <label for="hourlyPay">Hourly Pay ($)</label>
    <input type="number" id="hourlyPay" placeholder="e.g. 15">

    <label for="hoursWorked">Hours Worked</label>
    <input type="number" id="hoursWorked" placeholder="e.g. 20">

    <label for="state">State (optional)</label>
    <select id="state">
        <option value="">Select</option>
        <option value="CA">California - 10%</option>
        <option value="TX">Texas - 0%</option>
        <option value="NY">New York - 6%</option>
        <option value="PA">Pennsylvania - 3%</option>
        <option value="FL">Florida - 0%</option>
    </select>

    <label for="localTax">Local/District Tax % (optional)</label>
    <input type="number" id="localTax" placeholder="e.g. 2">

    <button onclick="calculateIncome()">Calculate Total Pay</button>
    
</div>

<h2 id="incomeResult"></h2>

<script src="side-income.js"></script>
</body>
</html>
