<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<title>Password Generator</title>
</head>

<body>

<div class="top-header"></div>


<!-- Home button -->
<a href="index.html" class="home-btn">
        
         <span class="outlined-text">Free Tools</span>
    </a>

<!-- Dropdown menu top-right -->
<div class="tool-menu">
    <button class="dropbtn">        
        <span class="outlined-text">Other Tools</span>
        <i class="fa-solid fa-caret-down"></i></button>
    <div class="dropdown-content">
        <a href="budget-tracker.html">Budget Tracker</a>
        <a href="side-income.html">Side Job Income Tracker</a>
        <a href="nutrition-calculator.html">Nutrition & Macro Calculator</a>
        <a href="password-generator.html">Password Generator</a>    
    </div>
</div>

<h1><i class="fa-solid fa-key"></i> Password Generator</h1>

<p>Create a secure random password instantly.</p>

<div class="budget-box">

<label>Password Length</label>
<input type="number" id="length" value="12">

<label><input type="checkbox" id="uppercase" checked>Include Uppercase</label>
<label><input type="checkbox" id="numbers" checked> Include Numbers</label>
<label><input type="checkbox" id="symbols"> Include Symbols</label>

<br><br>

<button class="btn" onclick="generatePassword()">Generate Password</button>

</div>

<h2 id="passwordResult"></h2>
<button class="btn" onclick="copyPassword()">Copy Password</button>

<script src="password.js"></script>

<script>
let lastScroll = 0;
const header = document.querySelector(".top-header");

window.addEventListener("scroll", () => {
    let currentScroll = window.pageYOffset;

    if (currentScroll > lastScroll) {
        // scrolling DOWN
        header.classList.add("hide");
    } else {
        // scrolling UP
        header.classList.remove("hide");
    }

    lastScroll = currentScroll;
});
</script>
</body>
</html>
